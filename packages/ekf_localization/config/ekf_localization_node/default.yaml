# robot_localization EKF configuration
#
# Assumptions:
# - Robot runs on a planar surface (2D)
# - Wheel odometry provides x/y/yaw + vx + vyaw
# - IMU is used ONLY for yaw changes (yaw rate)

frequency: 30.0
sensor_timeout: 0.2
two_d_mode: true

# Frames (match deadreckoning defaults)
map_frame: "$(arg veh)/map"            # unused unless world_frame is set to map
odom_frame: "$(arg veh)/odom"
base_link_frame: "$(arg veh)/footprint"
world_frame: "$(arg veh)/odom"

publish_tf: true
publish_acceleration: false

# Wheel odometry (deadreckoning)
odom0: "deadreckoning_node/odom"
odom0_queue_size: 10
odom0_nodelay: true
odom0_differential: false
odom0_relative: true

# State vector: [x, y, z,
#               roll, pitch, yaw,
#               vx, vy, vz,
#               vroll, vpitch, vyaw,
#               ax, ay, az]
odom0_config: [false,  false,  false,
               false, false, false,
               true,  false, false,
               false, false, false,
               false, false, false]

# IMU (yaw changes only)
# imu0: "imu_node/data"
# imu0_queue_size: 50
# imu0_nodelay: true
# imu0_differential: false
# imu0_relative: true
# imu0_remove_gravitational_acceleration: false

# Use only yaw rate (angular velocity z)
# imu0_config: [false, false, false,
#               false, false, false,
#               false, false, false,
#               false, false, true,
#               false, false, false# ]

# Let wheel odom dominate x/y; prevent IMU from affecting position.
